<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Ámbar Joyas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>Ámbar Joyas - Admin</h1>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-store"></i> Ver Tienda</a>
                <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
            </div>
        </nav>
    </header>

    <main class="admin-main">
        <!-- Login Section -->
        <div id="login-section" class="login-container">
            <div class="login-card">
                <h2><i class="fas fa-lock"></i> Acceso Administrador</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" required placeholder="admin@ambarjoyas.com">
                    </div>
                    <div class="form-group">
                        <label for="password"><i class="fas fa-key"></i> Contraseña</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary">Ingresar</button>
                </form>
            </div>
        </div>

        <!-- Admin Panel (hidden by default) -->
        <div id="admin-panel" class="admin-panel" style="display: none;">
            <div class="container">
                <h2><i class="fas fa-plus-circle"></i> Agregar Nuevo Producto</h2>
                <form id="producto-form" class="producto-form">
                    <div class="form-group">
                        <label for="nombre">Nombre del producto</label>
                        <input type="text" id="nombre" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="precio">Precio ($)</label>
                        <input type="number" id="precio" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" rows="3" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="imagen">Imagen del producto</label>
                        <input type="file" id="imagen" accept="image/*" required>
                    </div>
                    
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Agregar Producto</button>
                </form>

                <h2><i class="fas fa-box"></i> Productos Existentes</h2>
                <div id="admin-productos-lista" class="admin-productos-lista">
                    <!-- Lista de productos para administrar -->
                </div>
            </div>
        </div>
    </main>

    <div id="mensaje-toast" class="toast"></div>

    <script src="admin.js"></script>
</body>
</html>
